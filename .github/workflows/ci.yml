name: CI

on:
  push:
    branches:
      - 'main'
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "src/**"
      - "ui/src/**"
      - "ui/src/package.json"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build backend
        run: cargo build --release

      - name: Build frontend
        run: |
          cd ui
          bun install
          bun run build

      - name: Package artifacts
        run: |
          mkdir -p ci
          cp -r target/release/agent-insights ci/
          cp -r ui/dist ci/
          tar czf agi.tar.gz -C ci .

      - name: Upload ci artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-insights-ci
          path: agi.tar.gz