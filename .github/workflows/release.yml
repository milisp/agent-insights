name: Publish Cross-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-latest"
            args: ""
            artifact_name: "linux-x86_64"
          - platform: "macos-latest"
            args: ""
            artifact_name: "macos-arm64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: |
          cd ui
          bun install

      - name: Build backend
        shell: bash
        run: |
          if [ -n "${{ matrix.args }}" ]; then
            cargo build --release --target "${{ matrix.args }}"
          else
            cargo build --release
          fi

      - name: Build frontend
        run: |
          cd ui
          bun run build

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p release
          if [ -n "${{ matrix.args }}" ]; then
            cp target/${{ matrix.args }}/release/agent-insights release/
          else
            cp target/release/agent-insights release/
          fi
          cp -r ui/dist release/
          if [ "$RUNNER_OS" != "Windows" ]; then
            tar -czf agent-insights-${{ matrix.artifact_name }}.tar.gz -C release .
          else
            powershell Compress-Archive -Path release\* -DestinationPath agent-insights-${{ matrix.artifact_name }}.zip
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-insights-${{ matrix.artifact_name }}
          path: ${{ runner.os != 'Windows' && format('agent-insights-{0}.tar.gz', matrix.artifact_name) || format('agent-insights-{0}.zip', matrix.artifact_name) }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ runner.os != 'Windows' && format('agent-insights-{0}.tar.gz', matrix.artifact_name) || format('agent-insights-{0}.zip', matrix.artifact_name) }}